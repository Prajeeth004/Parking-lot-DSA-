<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parking Lot System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #f0c040;
    --accent2: #4af0b0;
    --accent3: #f05060;
    --text: #e8e8f0;
    --muted: #666680;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 52px; height: 52px;
    background: var(--accent);
    display: grid; place-items: center;
    font-size: 1.5rem;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }

  header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; }
  header p  { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-top: .2rem; }

  .api-status {
    margin-left: auto;
    display: flex; align-items: center; gap: .5rem;
    font-family: var(--mono); font-size: .7rem; color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .dot.online  { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .dot.offline { background: var(--accent3); }

  /* Layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    animation: fadeUp .4s ease both;
  }
  .card:nth-child(2) { animation-delay: .08s; }
  .card:nth-child(3) { animation-delay: .16s; }
  .card.full { grid-column: 1 / -1; animation-delay: .24s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex; align-items: center; gap: .75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .tag {
    font-family: var(--mono);
    font-size: .65rem;
    padding: .2rem .5rem;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  .tag-entry  { background: rgba(240,192,64,.15); color: var(--accent); border: 1px solid rgba(240,192,64,.3); }
  .tag-exit   { background: rgba(240,80,96,.15);  color: var(--accent3); border: 1px solid rgba(240,80,96,.3); }
  .tag-avail  { background: rgba(74,240,176,.15); color: var(--accent2); border: 1px solid rgba(74,240,176,.3); }
  .tag-log    { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }

  .card-header h2 { font-size: 1rem; font-weight: 600; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: .4rem;
  }

  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .65rem .8rem;
    font-family: var(--mono);
    font-size: .85rem;
    border-radius: 3px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 1rem;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--card); }

  .vehicle-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .5rem;
    margin-bottom: 1rem;
  }

  .vtype {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    padding: .6rem;
    border-radius: 3px;
    text-align: center;
    cursor: pointer;
    font-family: var(--mono);
    font-size: .7rem;
    transition: all .15s;
    user-select: none;
  }
  .vtype:hover { border-color: var(--accent); color: var(--accent); }
  .vtype.active { border-color: var(--accent); background: rgba(240,192,64,.1); color: var(--accent); }
  .vtype .icon { font-size: 1.4rem; display: block; margin-bottom: .3rem; }

  .btn {
    width: 100%;
    padding: .75rem;
    border: none;
    border-radius: 3px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: .85rem;
    cursor: pointer;
    letter-spacing: .5px;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-entry { background: var(--accent); color: #0a0a0f; }
  .btn-entry:hover:not(:disabled) { background: #f8d060; }
  .btn-exit  { background: var(--accent3); color: #fff; }
  .btn-exit:hover:not(:disabled)  { background: #f07080; }
  .btn-avail { background: var(--accent2); color: #0a0a0f; }
  .btn-avail:hover:not(:disabled) { background: #6af8c0; }

  .btn.loading::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,.15);
    animation: btnPulse .8s infinite;
  }
  @keyframes btnPulse { 0%,100%{opacity:0} 50%{opacity:1} }

  /* Result box */
  .result {
    margin-top: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1rem;
    font-family: var(--mono);
    font-size: .75rem;
    display: none;
    animation: fadeIn .2s ease;
  }
  .result.show { display: block; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .result.success { border-color: rgba(74,240,176,.4); }
  .result.error   { border-color: rgba(240,80,96,.4); }

  .result-row {
    display: flex; justify-content: space-between;
    padding: .35rem 0;
    border-bottom: 1px solid var(--border);
  }
  .result-row:last-child { border-bottom: none; }
  .result-key   { color: var(--muted); }
  .result-val   { color: var(--text); font-weight: 700; }
  .result-val.highlight { color: var(--accent); }
  .result-val.fee       { color: var(--accent2); }
  .result-val.err       { color: var(--accent3); }

  /* Availability bars */
  .avail-grid { display: flex; flex-direction: column; gap: .75rem; margin-top: .5rem; }

  .avail-item { }
  .avail-label {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: .7rem;
    margin-bottom: .35rem;
  }
  .avail-name { color: var(--muted); }
  .avail-count { }
  .avail-count span { color: var(--accent2); }

  .bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    background: var(--accent2);
  }
  .bar-fill.warning { background: var(--accent); }
  .bar-fill.full    { background: var(--accent3); }

  /* Log */
  .log-list {
    max-height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: .4rem;
  }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-item {
    display: flex; gap: .75rem;
    font-family: var(--mono); font-size: .72rem;
    padding: .5rem .75rem;
    background: var(--surface);
    border-radius: 2px;
    border-left: 2px solid var(--border);
    animation: fadeIn .2s ease;
  }
  .log-item.entry-log  { border-color: var(--accent); }
  .log-item.exit-log   { border-color: var(--accent3); }
  .log-item.error-log  { border-color: rgba(240,80,96,.5); }

  .log-time { color: var(--muted); white-space: nowrap; }
  .log-msg  { color: var(--text); }

  .empty-log { font-family: var(--mono); font-size: .75rem; color: var(--muted); text-align: center; padding: 2rem 0; }

  /* Ticket badge */
  .ticket-badge {
    display: inline-block;
    background: rgba(240,192,64,.1);
    border: 1px dashed rgba(240,192,64,.4);
    color: var(--accent);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .2rem .5rem;
    border-radius: 2px;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .card.full { grid-column: 1; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">🅿</div>
    <div>
      <h1>PARKING LOT SYSTEM</h1>
      <p>FastAPI · SQLite · DSA Project</p>
    </div>
    <div class="api-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">checking...</span>
    </div>
  </header>

  <div class="grid">

    <!-- ENTRY -->
    <div class="card">
      <div class="card-header">
        <span class="tag tag-entry">POST /entry</span>
        <h2>Vehicle Entry</h2>
      </div>

      <label>VEHICLE NUMBER</label>
      <input id="entryVehicleNum" type="text" placeholder="e.g. TS09AB1234" />

      <label>VEHICLE TYPE</label>
      <div class="vehicle-picker">
        <div class="vtype active" data-type="BIKE"  onclick="selectType(this)">
          <span class="icon">🏍️</span>BIKE
        </div>
        <div class="vtype" data-type="CAR"   onclick="selectType(this)">
          <span class="icon">🚗</span>CAR
        </div>
        <div class="vtype" data-type="TRUCK" onclick="selectType(this)">
          <span class="icon">🚛</span>TRUCK
        </div>
      </div>

      <button class="btn btn-entry" onclick="vehicleEntry()">ENTER LOT</button>

      <div class="result" id="entryResult"></div>
    </div>

    <!-- EXIT -->
    <div class="card">
      <div class="card-header">
        <span class="tag tag-exit">POST /exit</span>
        <h2>Vehicle Exit</h2>
      </div>

      <label>TICKET ID</label>
      <input id="exitTicketId" type="number" placeholder="e.g. 1" min="1"/>

      <div style="height:1rem"></div>
      <div style="height:1rem"></div>
      <div style="height:1.75rem"></div>

      <button class="btn btn-exit" onclick="vehicleExit()">EXIT LOT</button>

      <div class="result" id="exitResult"></div>
    </div>

    <!-- AVAILABILITY -->
    <div class="card full">
      <div class="card-header">
        <span class="tag tag-avail">GET /availability</span>
        <h2>Spot Availability</h2>
        <button class="btn btn-avail" style="width:auto;padding:.4rem 1rem;margin-left:auto;font-size:.75rem" onclick="fetchAvailability()">REFRESH</button>
      </div>

      <div class="avail-grid" id="availGrid">
        <div class="empty-log">Click REFRESH to load availability</div>
      </div>
    </div>

    <!-- LOG -->
    <div class="card full">
      <div class="card-header">
        <span class="tag tag-log">ACTIVITY LOG</span>
        <h2>Events</h2>
        <button onclick="clearLog()" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:.7rem">CLEAR</button>
      </div>
      <div class="log-list" id="logList">
        <div class="empty-log">No events yet</div>
      </div>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let selectedType = 'BIKE';
  let logs = [];

  // ── Utils ──────────────────────────────────────────────────────────────────

  function selectType(el) {
    document.querySelectorAll('.vtype').forEach(v => v.classList.remove('active'));
    el.classList.add('active');
    selectedType = el.dataset.type;
  }

  function now() {
    return new Date().toLocaleTimeString('en-IN', { hour12: false });
  }

  function addLog(type, msg) {
    logs.unshift({ type, msg, time: now() });
    renderLog();
  }

  function renderLog() {
    const el = document.getElementById('logList');
    if (!logs.length) { el.innerHTML = '<div class="empty-log">No events yet</div>'; return; }
    el.innerHTML = logs.map(l => `
      <div class="log-item ${l.type}-log">
        <span class="log-time">${l.time}</span>
        <span class="log-msg">${l.msg}</span>
      </div>
    `).join('');
  }

  function clearLog() { logs = []; renderLog(); }

  function setLoading(btn, on) {
    if (on) { btn.classList.add('loading'); btn.disabled = true; }
    else     { btn.classList.remove('loading'); btn.disabled = false; }
  }

  // ── API Calls ──────────────────────────────────────────────────────────────

  async function checkStatus() {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      const r = await fetch(`${API}/`);
      if (r.ok) {
        dot.className  = 'dot online';
        text.textContent = 'API online';
        fetchAvailability();
      } else { throw new Error(); }
    } catch {
      dot.className  = 'dot offline';
      text.textContent = 'API offline';
    }
  }

  async function vehicleEntry() {
    const num = document.getElementById('entryVehicleNum').value.trim().toUpperCase();
    const resultEl = document.getElementById('entryResult');
    const btn = document.querySelector('.btn-entry');

    if (!num) { showResult(resultEl, 'error', [['ERROR', 'Vehicle number is required']]); return; }

    setLoading(btn, true);
    try {
      const r = await fetch(`${API}/entry/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vehicle_number: num, vehicle_type: selectedType })
      });
      const data = await r.json();

      if (r.ok) {
        showResult(resultEl, 'success', [
          ['TICKET ID',    data.ticket_id,    'highlight'],
          ['VEHICLE',      data.vehicle_number],
          ['TYPE',         data.vehicle_type],
          ['FLOOR',        `Floor ${data.floor}`],
          ['SPOT',         `#${data.spot_number}`],
          ['ENTRY TIME',   new Date(data.entry_time).toLocaleTimeString()],
        ]);
        addLog('entry', `🟡 ${data.vehicle_number} (${data.vehicle_type}) → Floor ${data.floor}, Spot #${data.spot_number} | Ticket #${data.ticket_id}`);
        document.getElementById('entryVehicleNum').value = '';

        // Auto-fill exit ticket id
        document.getElementById('exitTicketId').value = data.ticket_id;
        fetchAvailability();
      } else {
        showResult(resultEl, 'error', [['ERROR', data.detail, 'err']]);
        addLog('error', `❌ Entry failed: ${data.detail}`);
      }
    } catch (e) {
      showResult(resultEl, 'error', [['ERROR', 'Cannot reach API. Is FastAPI running?', 'err']]);
    }
    setLoading(btn, false);
  }

  async function vehicleExit() {
    const ticketId = document.getElementById('exitTicketId').value.trim();
    const resultEl = document.getElementById('exitResult');
    const btn = document.querySelector('.btn-exit');

    if (!ticketId) { showResult(resultEl, 'error', [['ERROR', 'Ticket ID is required']]); return; }

    setLoading(btn, true);
    try {
      const r = await fetch(`${API}/exit/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticket_id: parseInt(ticketId) })
      });
      const data = await r.json();

      if (r.ok) {
        showResult(resultEl, 'success', [
          ['TICKET ID',     data.ticket_id,              'highlight'],
          ['VEHICLE',       data.vehicle_number],
          ['TYPE',          data.vehicle_type],
          ['DURATION',      `${data.duration_hours} hrs`],
          ['FEE',           `₹${data.fee}`,               'fee'],
        ]);
        addLog('exit', `🔴 ${data.vehicle_number} exited | Duration: ${data.duration_hours}h | Fee: ₹${data.fee}`);
        document.getElementById('exitTicketId').value = '';
        fetchAvailability();
      } else {
        showResult(resultEl, 'error', [['ERROR', data.detail, 'err']]);
        addLog('error', `❌ Exit failed: ${data.detail}`);
      }
    } catch {
      showResult(resultEl, 'error', [['ERROR', 'Cannot reach API. Is FastAPI running?', 'err']]);
    }
    setLoading(btn, false);
  }

  async function fetchAvailability() {
    try {
      const r = await fetch(`${API}/availability/`);
      const data = await r.json();
      renderAvailability(data.availability);
    } catch {
      document.getElementById('availGrid').innerHTML =
        '<div class="empty-log">⚠ Could not fetch availability</div>';
    }
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function showResult(el, type, rows) {
    el.className = `result show ${type}`;
    el.innerHTML = rows.map(([k, v, cls]) =>
      `<div class="result-row">
        <span class="result-key">${k}</span>
        <span class="result-val ${cls || ''}">${v}</span>
      </div>`
    ).join('');
  }

  const SPOT_ICONS = { SMALL: '🏍️ BIKE', MEDIUM: '🚗 CAR', LARGE: '🚛 TRUCK' };

  function renderAvailability(list) {
    if (!list || !list.length) {
      document.getElementById('availGrid').innerHTML = '<div class="empty-log">No data</div>';
      return;
    }
    document.getElementById('availGrid').innerHTML = list.map(item => {
      const pct = item.total > 0 ? (item.available / item.total) * 100 : 0;
      const fillClass = pct <= 0 ? 'full' : pct <= 30 ? 'warning' : '';
      return `
        <div class="avail-item">
          <div class="avail-label">
            <span class="avail-name">${SPOT_ICONS[item.spot_size] || item.spot_size}</span>
            <span class="avail-count"><span>${item.available}</span> / ${item.total} available</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill ${fillClass}" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  checkStatus();
  setInterval(checkStatus, 15000);
</script>
</body>
</html>
